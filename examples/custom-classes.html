<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Choicey – Custom Classes Example</title>
  <link rel="stylesheet" href="./choicey.css">
  <script src="./es-module-shims.js"></script>
  <script type="module-shim">
    import { Application } from "./stimulus.js"
    import { Choicey } from "./choicey.js"
    window.Stimulus = Application.start()
    Stimulus.register("choicey", Choicey)
  </script>
</head>
<body>
  <div style="max-width:400px;margin:2rem auto">
    <div data-controller="choicey"
      data-choicey-items-value='[
        { "value": "cuckoo", "text": "Cuckoo 🐦", "spanClass":"badge bg-primary"},
        { "value": "macaw", "text": "Macaw 🦜", "spanClass":"badge bg-success"},
        { "value": "rooster", "text": "Rooster 🐓", "liClass": "bg-secondary", "disabled": true }
      ]'
      data-placeholder="Search birds...">
      <select multiple class="choicey__hidden" data-choicey-target="hidden" name="birds[]"></select>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="./choicey.css">
        <script src="./es-module-shims.js"></script>
        <script type="module-shim">
            import { Application } from "./stimulus.js"
            import { Choicey } from "./choicey.js"
            
            window.Stimulus = Application.start()
            Stimulus.register("choicey", Choicey)
        </script>
    </head>
    <body>
        <div data-controller="choicey"
            data-choicey-addable-url-value="http://localhost:3001/elements-error"
            data-choicey-search-placeholder-value="Search cars..."
        >
            <select multiple class="choicey__hidden" data-choicey-target="hidden" name="cars[]"></select>
        </div>
    </body>
</html>
